name: Seventeenth Workflow
on:
  workflow_dispatch:
    inputs:
      title:
        description: "Custom Title"
        type: string
        default: "Testing text title"
        required: false

jobs:
  call-workflow:
    uses: ./.github/workflows/workflow.yaml
    with:
      title: ${{ inputs.title }}
  call-external-workflow:
    uses: Artem5457/workflows/.github/workflows/workflow.yml@main
    secrets:
      PASSWORD: ${{ secrets.PASSWORD }}