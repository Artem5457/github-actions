name: Eleventh Workflow
on: [push]
env:
  WF_CUSTOM_VAR: WF_1

jobs:
  run-first-command:
    runs-on: ubuntu-latest
    env:
      JOB_CUSTOM_VAR: JOB_1
    steps:
      - name: Set New Var
        run: echo "NEW_CUSTOM_VAR=New Value" >> "$GITHUB_ENV"
      - name: Vars
        env:
          STEP_CUSTOM_VAR: STEP_1
          WF_CUSTOM_VAR: WF_1 => STEP_2
        run: |
          echo $GITHUB_REF
          echo '${{ github.ref }}'
          echo $WF_CUSTOM_VAR
          echo '${{ env.WF_CUSTOM_VAR }}'
          echo $JOB_CUSTOM_VAR
          echo $STEP_CUSTOM_VAR
          echo $NEW_CUSTOM_VAR